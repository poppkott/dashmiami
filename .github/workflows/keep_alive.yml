name: Wake Up Streamlit

on:
  schedule:
    # Запуск каждые 4 часа (чтобы точно не уснул)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Позволяет запустить вручную кнопкой для теста

jobs:
  ping_streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Send a sophisticated ping
        run: |
          # Используем расширенный curl, который имитирует реальный браузер
          curl -I -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          https://your-app-name.streamlit.app
